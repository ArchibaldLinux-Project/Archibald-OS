# Neofetch config for Archibald Linux

print_info() {
    info title
    info underline
    info "OS" distro
    info "Host" model
    info "Kernel" kernel
    info "Uptime" uptime
    info "Packages" packages
    info "Shell" shell
    info "Resolution" resolution
    info "DE" de
    info "WM" wm
    info "Theme" theme
    info "Icons" icons
    info "Terminal" term
    info "CPU" cpu
    info "GPU" gpu
    info "Memory" memory

    info cols
}

# Title
title_fqdn="off"
title_host_name="hostname"

# Underline
underline_char="-"
underline_enabled="on"

# Distro
distro_shorthand="on"
os_arch="on"

# Kernel
kernel_shorthand="on"

# Uptime
uptime_shorthand="on"

# Packages
package_managers="on"

# Shell
shell_path="off"
shell_version="on"

# CPU
cpu_speed="on"
cpu_cores="logical"
cpu_temp="off"

# GPU
gpu_type="all"
gpu_brand="on"

# Memory
memory_percent="on"
memory_unit="mib"

# Colors
block_range=(0 15)
color_blocks="on"
bold="on"
block_width=3
block_height=1

# Ascii
ascii_distro="arch_small"
ascii_colors=(distro)
ascii_bold="on"

# Image
image_source="auto"
image_backend="ascii"
image_loop="off"
thumbnail_dir="${XDG_CACHE_HOME:-${HOME}/.cache}/thumbnails/neofetch"
crop_mode="normal"
crop_offset="center"
image_size="auto"
gap=3
yoffset=0
xoffset=0
background_color=

# Misc
separator=":"
stdout="off"
