<?xml version="1.0" encoding="UTF-8"?>
<svg width="1920" height="1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1b263b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#415a77;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1793d1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#778da9;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg-gradient)"/>
  
  <!-- Subtle geometric shapes -->
  <circle cx="1600" cy="200" r="300" fill="#1793d1" opacity="0.05"/>
  <circle cx="300" cy="800" r="400" fill="#1793d1" opacity="0.03"/>
  <circle cx="1000" cy="540" r="500" fill="#1793d1" opacity="0.02"/>
  
  <!-- Accent line -->
  <rect x="0" y="1060" width="1920" height="20" fill="url(#accent-gradient)" opacity="0.3"/>
  
  <!-- Archibald Logo/Text -->
  <text x="960" y="520" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#1793d1" text-anchor="middle" filter="url(#glow)" opacity="0.15">
    Archibald Linux
  </text>
  
  <!-- Subtle grid pattern -->
  <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
    <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#1793d1" stroke-width="0.5" opacity="0.03"/>
  </pattern>
  <rect width="1920" height="1080" fill="url(#grid)"/>
</svg>
